defaults:
  - task: kitchen_complete

name: train_flowpolicy_lowdim

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "kitchen_complete"

n_obs_steps: 2
n_action_steps: 4
# horizon otomatis menyesuaikan n_obs_steps/n_action_steps agar sampler
# selalu punya sequence yang cukup panjang. ConditionalUnet1D punya 3
# level downsampling stride-2, sehingga horizon HARUS kelipatan 4 supaya
# skip connection up/down cocok. Karena itu kita bulatkan ke atas ke
# kelipatan 4 dengan minimal 4.
horizon: ${eval:'4 * ((max(${n_obs_steps} + ${n_action_steps} - 1, 4) + 3) // 4)'}
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  _target_: flow_policy_3d.policy.flowpolicy_lowdim.FlowPolicyLowdim
  condition_type: film
  use_down_condition: true
  use_mid_condition: true
  use_up_condition: true

  diffusion_step_embed_dim: 128
  down_dims:
  - 256
  - 512
  - 1024
  encoder_output_dim: 64
  horizon: ${horizon}
  kernel_size: 5
  n_action_steps: ${n_action_steps}
  n_groups: 8
  n_obs_steps: ${n_obs_steps}
  obs_as_global_cond: true
  shape_meta: ${shape_meta}
  state_mlp_size: [256, 256]
  encoder_use_layernorm: true
  action_clip: 1.0
  # Consistency flow-matching hyperparameters. Eksplisit di yaml supaya
  # bisa di-override lewat Hydra (policy.Conditional_ConsistencyFM.eps=1e-3
  # dst.) oleh skrip random search.
  Conditional_ConsistencyFM:
    eps: 1.0e-2
    num_segments: 2
    boundary: 1
    delta: 1.0e-2
    alpha: 1.0e-5
    num_inference_step: 1


ema:
  _target_: flow_policy_3d.model.flow.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 3000
  gradient_accumulate_every: 1
  use_ema: True
  rollout_every: 200
  checkpoint_every: 200
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0
  max_grad_norm: 1.0
  ema_decay: 0.95

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${exp_name}_${training.seed}
  project: flowpolicy_kitchen
  resume: true
  tags:
  - flowpolicy
  - kitchen
  - lowdim

checkpoint:
  # True supaya training manual (`python train.py ...`) otomatis menyimpan
  # checkpoint di <run_dir>/checkpoints/latest.ckpt. Tanpa ini, `eval.py` dan
  # `infer_kitchen.py` tidak punya checkpoint untuk dimuat dan normalizer
  # model akan kosong (error: "ParameterDict has no attribute 'agent_pos'").
  save_ckpt: True
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 1
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
