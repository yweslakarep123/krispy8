- task=kitchen_complete
- training.seed=3
- training.device=cuda
- training.debug=False
- exp_name=random_search
- logging.name=random_search_cfg_00_seed3
- logging.mode=offline
- checkpoint.save_ckpt=True
- training.num_epochs=500
- optimizer.lr=1e-05
